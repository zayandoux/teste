<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discografia Britney Spears</title>
	
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #a0a0a5;
            --accent-color: #fa233b; 
            --border-radius: 16px;
            --player-bg: rgba(24, 24, 24, 0.85); 
            --glass-bg: rgba(22, 22, 22, 0.5);
            --transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            --blur-overlay-opacity: 0; 
        }

        /* AJUSTES PARA MODO CLARO */
        body.light-mode { 
            --bg-color: #f5f5f7; 
            --text-main: #1d1d1f; 
            --card-bg: #ffffff;
            --text-muted: #86868b;
            --player-bg: rgba(255, 255, 255, 0.90); 
        }
        body.light-mode .grid-card { border: 1px solid #e5e5e7; }
        body.light-mode .album-card-title { color: #1d1d1f; }
        body.light-mode .album-card-artist { color: #86868b; }
        body.light-mode .top-nav-bar { background-color: transparent; }
        body.light-mode .modal-content { background-color: #ffffff; color: #1d1d1f; border: 1px solid #e5e5e7; }
        body.light-mode .modal-text { color: #515154; }
        body.light-mode .modal-close { color: #1d1d1f; }
        body.light-mode .track-row { border-bottom: 1px solid rgba(0,0,0,0.05); }
        body.light-mode .track-row:hover { background-color: rgba(0,0,0,0.03); }
        body.light-mode .floating-player-wrapper { border: 1px solid rgba(0, 0, 0, 0.08); color: #1d1d1f; box-shadow: 0 10px 40px rgba(0,0,0,0.15); }
        body.light-mode .settings-popup { background: rgba(255, 255, 255, 0.95); border: 1px solid rgba(0,0,0,0.1); }
        body.light-mode .control-btn, body.light-mode .volume-btn { color: #1d1d1f; }
        body.light-mode .control-btn:not(.active):not(.play-pause-btn) { color: #515154; }
        body.light-mode .repeat-btn-text, body.light-mode .shuffle-btn { color: #1d1d1f !important; }
        body.light-mode .timeline-container { color: #86868b; }
        body.light-mode .progress-bar-bg { background-color: rgba(0, 0, 0, 0.1); }
        body.light-mode .progress-bar-fill { background-color: var(--accent-color); }
        body.light-mode .version-card { background-color: #eaeaea; }
        body.light-mode .version-card span { color: #1d1d1f; }
        body.light-mode .version-card:hover { background-color: #dddddd; }

        /* AJUSTES DE CONTRASTE NO MODO ARTE DO ÁLBUM */
        body.bg-art-active { --text-muted: #e1e1e6; }
        body.bg-art-active.light-mode { --text-muted: #2c2c2e; }
        body.bg-art-active .album-meta { color: var(--text-main) !important; text-shadow: 0 1px 4px rgba(0,0,0,0.6); }
        body.bg-art-active .track-number { color: var(--text-main) !important; font-weight: bold; }
        
        /* Proteção visual traseira para as informações não misturarem com o fundo */
        body.bg-art-active .right-content-block {
            background: rgba(20, 20, 20, 0.65);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        body.bg-art-active.light-mode .right-content-block {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0, 0, 0, 0.08);
        }

        /* BACKDROP CORRIGIDO */
        .dynamic-blur-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-size: cover; background-position: center;
            filter: blur(2px) brightness(0.9) saturate(1.2); transform: scale(1.1); /* <--- opacidade modo escuro */
            transition: opacity 0.8s ease, background-image 0.8s ease;
            z-index: -2;
        }
        body.light-mode .dynamic-blur-bg { filter: blur(2px) brightness(1.2) saturate(1.2); } /* <--- opacidade modo claro */
        
        .dynamic-blur-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(18, 18, 18, 0.25); z-index: -1; /* <--- Reduzi a opacidade da película escura de 0.4 para 0.25 */
            opacity: var(--blur-overlay-opacity); transition: opacity 0.8s ease;
        }
        body.light-mode .dynamic-blur-overlay { background: rgba(255, 255, 255, 0.15); } /* <--- Reduzi no modo claro de 0.15 para 0.15 */

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; transition: background-color 0.3s, color 0.3s; }
        main { flex: 1; display: flex; flex-direction: column; height: 100vh; position: relative; }

        /* DASHBOARD */
        .dashboard-section { display: block; padding: 40px; padding-bottom: 150px; height: 100%; position: relative; overflow-y: auto; overflow-x: hidden; }
        .section-header-bar { display: flex; justify-content: center; align-items: center; margin-bottom: 20px; z-index: 10; position: relative; }
        .section-title { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; text-align: center; }
        
        /* LOGICA DE VISUALIZAÇÃO: GRADE VS CARROSSEL NO PC */
        .album-grid { display: none; }
        body.layout-grid .carousel-container { display: none !important; }
        body.layout-grid .album-grid { display: grid !important; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 30px; margin-top: 20px; }
        
        .grid-card { background-color: var(--card-bg); padding: 20px; border-radius: 12px; cursor: pointer; transition: all 0.3s ease; border: 1px solid transparent; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .grid-card:hover { transform: translateY(-5px); background-color: #2d2d2d; box-shadow: 0 15px 30px rgba(0,0,0,0.5); border-color: #4a4a4c; }
        
        /* CARROSSEL 3D */
        .carousel-container {
            position: relative; width: 100%; height: 50vh; min-height: 450px;
            display: flex; align-items: center; justify-content: center; overflow: visible; margin-top: 10px; perspective: 2000px; transform-style: preserve-3d;
        }
        .carousel-track { position: relative; width: 100%; max-width: 1200px; height: 100%; transform-style: preserve-3d; }
        .carousel-nav {
            position: absolute; top: 50%; transform: translateY(-50%); background: rgba(30, 30, 30, 0.6); backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1); color: white; width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; transition: var(--transition);
        }
        body.light-mode .carousel-nav { background: rgba(255, 255, 255, 0.7); color: #1d1d1f; border: 1px solid rgba(0, 0, 0, 0.1); }
        .carousel-nav:hover { background: var(--accent-color); color: white; transform: translateY(-50%) scale(1.1); border-color: transparent; }
        .carousel-nav.prev { left: 20px; } .carousel-nav.next { right: 20px; }
        
        .carousel-card { 
            position: absolute; top: 50%; left: 50%; width: 294px; transform: translate(-50%, -50%); background-color: var(--card-bg); padding: 16px; border-radius: var(--border-radius); cursor: pointer; will-change: transform, opacity;
            transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.3s, border-color 0.3s;
            border: 1px solid transparent; box-shadow: 0 15px 45px rgba(0,0,0,0.6); transform-style: preserve-3d; backface-visibility: hidden; -webkit-backface-visibility: hidden;
        }
        .carousel-card:hover { background-color: #2d2d2d; border-color: #4a4a4c; }
        body.light-mode .carousel-card:hover { background-color: #f0f0f2; border-color: #ccc; }
        
        .album-art-wrapper { position: relative; width: 100%; padding-top: 100%; border-radius: 10px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.5); }
        .album-art-wrapper img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .album-card-title { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px; text-align: center; }
        .album-card-artist { font-size: 13px; color: var(--text-muted); text-align: center; }

        /* DETALHES DO ÁLBUM */
        .album-detail-section { display: none; flex-direction: column; height: 100vh; overflow: hidden; }
        .top-nav-bar { background-color: var(--bg-color); padding: 20px 40px 10px 40px; flex-shrink: 0; transition: background-color 0.3s; z-index: 10; }
        body.bg-art-active .top-nav-bar { background-color: transparent; }
        .back-btn { background: rgba(35, 35, 35, 0.95); border: 1px solid rgba(255, 255, 255, 0.1); color: var(--text-main); padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; transition: var(--transition); }
        .back-btn:hover { background: rgba(255, 255, 255, 0.15); transform: scale(1.02); }
        body.light-mode .back-btn { background: rgba(240, 240, 240, 0.95); border: 1px solid rgba(0, 0, 0, 0.08); }

        .detail-split-container { display: flex; flex: 1; overflow: hidden; padding: 10px 40px 30px 40px; gap: 50px; }
        
        .left-album-block { width: 480px; flex-shrink: 0; display: flex; flex-direction: column; }
        .album-media-container { width: 100%; padding-top: 100%; position: relative; border-radius: 16px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); overflow: hidden; background-color: #000; }
        .album-art, .album-video { width: 100% !important; height: 100% !important; object-fit: cover !important; position: absolute; top: 0; left: 0; display: block; }
        .album-video { display: none; }

        .right-content-block { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .album-header-top { display: flex; flex-direction: column; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        body.light-mode .album-header-top { border-bottom: 1px solid rgba(0, 0, 0, 0.05); }
        .album-title-header { font-size: 29px; font-weight: 800; margin-bottom: 4px; letter-spacing: -0.5px; }
        
        .album-header-body { display: flex; flex: 1; overflow: hidden; gap: 30px; }
        .album-info-side { display: flex; flex-direction: column; min-width: 170px; flex-shrink: 0; }
        .album-artist-header { font-size: 18px; color: var(--accent-color); font-weight: 600; margin-bottom: 8px; }
        .album-meta { font-size: 14px; color: var(--text-muted); margin-bottom: 16px; }
        
        .play-album-btn { background-color: var(--accent-color); color: #ffffff; border: none; padding: 10px 24px; border-radius: 30px; font-weight: 600; font-size: 13px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; width: fit-content; transition: transform 0.2s; box-shadow: 0 4px 15px rgba(250, 35, 59, 0.4); }
        .play-album-btn:hover { transform: scale(1.04); }

        .right-tracklist-block { flex: 1; overflow-y: auto; padding-right: 15px; margin-bottom: 15px; }

        .tracklist { display: flex; flex-direction: column; width: 100%; }
        .track-row { display: flex; align-items: center; padding: 14px 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.03); cursor: pointer; border-radius: 6px; transition: background-color 0.2s; }
        .track-row:hover { background-color: rgba(255, 255, 255, 0.04); }
        .track-row.playing { background-color: var(--accent-color) !important; color: #ffffff; }
        .track-number { width: 40px; color: var(--text-muted); font-size: 12px; }
        .track-row.playing .track-number { color: rgba(255, 255, 255, 0.7); }
        .track-title { flex: 1; font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .equalizer { display: none; align-items: flex-end; gap: 2px; width: 20px; height: 15px; margin-right: 20px; }
        .track-row.playing .equalizer { display: flex; }
        .track-row.playing .track-number { display: none; }
        .eq-bar { width: 3px; background-color: #ffffff; animation: bounce 0.8s ease-in-out infinite alternate; border-radius: 1px; }
        .eq-bar-1 { height: 30%; animation-delay: 0.1s; } .eq-bar-2 { height: 100%; animation-delay: 0.3s; } .eq-bar-3 { height: 60%; animation-delay: 0.5s; }
        @keyframes bounce { 10% { transform: scaleY(0.3); } 100% { transform: scaleY(1.1); } }

        /* PLAYER FLUTUANTE */
        .floating-player-wrapper {
            position: fixed; 
            bottom: 25px; 
            right: 40px; 
            left: auto;
            transform: none;
            width: 500px; 
            background-color: var(--player-bg); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 20px; 
            padding: 14px 20px; 
            display: none; 
            align-items: center; 
            justify-content: space-between; 
            gap: 15px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); 
            transition: var(--transition); 
            z-index: 99999; 
            cursor: pointer; 
        }
        
        /* BOTÃO DE RECOLHER */
        .player-toggle-slide-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 44px;
            flex-shrink: 0;
            transition: var(--transition);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            margin-right: -5px;
            padding-right: 8px;
        }
        body.light-mode .player-toggle-slide-btn {
            border-right: 1px solid rgba(0, 0, 0, 0.1);
        }
        .player-toggle-slide-btn:hover {
            color: var(--accent-color);
        }
        
        /* DESKTOP RECOLHIDO */
        @media (min-width: 821px) {
            .floating-player-wrapper.player-collapsed {
                transform: translateX(calc(100% - 5px)) !important;
                box-shadow: -5px 5px 25px rgba(0,0,0,0.5);
            }
        }
        /* MOBILE RECOLHIDO */
        @media (max-width: 820px) {
            .floating-player-wrapper.player-collapsed {
                transform: translateX(calc(-50% + 92vw - 45px)) !important;
                box-shadow: -5px 5px 25px rgba(0,0,0,0.5);
            }
        }
        
        .player-control-center, .volume-container, .center-meta img { cursor: default; }
        .center-meta { display: flex; align-items: center; gap: 12px; width: 140px; overflow: hidden; flex-shrink: 0; pointer-events: none;}
        .player-cover-mini { width: 46px; height: 46px; border-radius: 8px; object-fit: cover; flex-shrink: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.4); background-color: var(--card-bg); overflow: hidden; }
        
        .player-song-details { overflow: hidden; display: flex; flex-direction: column; }
        .player-song-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-song-artist { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }

        .player-control-center { display: flex; flex-direction: column; align-items: center; flex: 1; gap: 8px; min-width: 180px;}
        .player-controls { display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
        .control-btn { background: none; border: none; color: #ffffff; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0.7; transition: var(--transition); }
        .control-btn:hover { opacity: 1; transform: scale(1.12); }
        .control-btn.active.shuffle-btn { color: var(--accent-color) !important; opacity: 1; filter: drop-shadow(0 2px 6px rgba(250, 35, 59, 0.4)); }

        .play-pause-btn { background-color: #444446 !important; color: #ffffff !important; width: 38px; height: 38px; border-radius: 50%; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3); opacity: 1 !important; }
        body.light-mode .play-pause-btn { background-color: #515154 !important; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15); }
        .play-pause-btn:hover { transform: scale(1.15) !important; background-color: #545456 !important; box-shadow: 0 6px 14px rgba(0, 0, 0, 0.4); }
        body.light-mode .play-pause-btn:hover { background-color: #3a3a3c !important; }

        .repeat-btn-text { background: rgba(255, 255, 255, 0.08) !important; padding: 4px 8px !important; border-radius: 10px !important; font-size: 10px !important; font-weight: 600 !important; }
        body.light-mode .repeat-btn-text { background: rgba(0, 0, 0, 0.05) !important; }

        .timeline-container { width: 100%; display: flex; align-items: center; gap: 10px; font-size: 10px; color: var(--text-muted); font-weight: 500; }
        .progress-bar-bg { flex: 1; height: 5px; background-color: rgba(255, 255, 255, 0.12); border-radius: 3px; position: relative; cursor: pointer; transition: height 0.2s ease; }
        .progress-bar-bg:hover { height: 7px; }
        .progress-bar-fill { height: 100%; width: 0%; background-color: var(--accent-color); border-radius: 3px; position: absolute; top: 0; left: 0; pointer-events: none; }
        .progress-bar-bg::after { content: ''; position: absolute; top: 50%; left: var(--progress-percent, 0%); width: 10px; height: 10px; background-color: #ffffff; border-radius: 50%; transform: translate(-50%, -50%) scale(0); box-shadow: 0 2px 6px rgba(0,0,0,0.4); transition: transform 0.15s ease; pointer-events: none; z-index: 2; }
        .progress-bar-bg:hover::after { transform: translate(-50%, -50%) scale(1); }

        .volume-container { position: relative; display: flex; align-items: center; justify-content: flex-end; width: auto; gap: 10px; }
        .volume-btn { background: none; border: none; color: #ffffff; cursor: pointer; opacity: 0.7; transition: var(--transition); }
        .volume-btn:hover { opacity: 1; transform: scale(1.08); }
        .volume-slider { -webkit-appearance: none; appearance: none; width: 60px; height: 4px; background: rgba(255, 255, 255, 0.2); border-radius: 2px; outline: none; cursor: pointer; }
        .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 10px; height: 10px; border-radius: 50%; background: #ffffff; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        body.light-mode .volume-slider { background: rgba(0, 0, 0, 0.15); }
        body.light-mode .volume-slider::-webkit-slider-thumb { background: var(--accent-color); }

        /* CONFIGURAÇÕES */
        .top-right-settings {
            position: fixed;
            top: 25px;
            right: 40px;
            z-index: 100000;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .settings-btn-top {
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .settings-btn-top:hover {
            background: var(--accent-color);
            transform: scale(1.1);
            border-color: transparent;
        }

        body.light-mode .settings-btn-top {
            background: rgba(255, 255, 255, 0.7);
            color: #1d1d1f;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .settings-popup {
            position: absolute;
            top: 55px; 
            right: 0;
            background: var(--player-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 15px;
            display: none;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            cursor: default;
            min-width: 180px;
        }
        .settings-popup.show { display: flex; }
        
        .bg-style-selector { background: transparent; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; padding: 6px; color: var(--text-main); font-size: 12px; font-weight: 600; outline: none; cursor: pointer; width: 100%; }
        body.light-mode .bg-style-selector { border: 1px solid rgba(0,0,0,0.2); }
        .bg-style-selector option { background: var(--card-bg); color: var(--text-main); }
        
        .switch-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: 600; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #555; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent-color); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* MODAIS */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0,0,0,0.75); backdrop-filter: blur(15px); display: none; align-items: center; justify-content: center; z-index: 200; padding: 20px; }
        .modal-content { background-color: #1e1e1e; padding: 30px; border-radius: 16px; max-width: 500px; width: 100%; border: 1px solid rgba(255,255,255,0.08); position: relative; }
        .modal-close { position: absolute; top: 15px; right: 15px; background: none; border: none; color: white; font-size: 18px; cursor: pointer; }
        .version-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 20px; }
        .version-card { background-color: #2c2c2e; padding: 12px; border-radius: 12px; cursor: pointer; text-align: center; transition: var(--transition); border: 1px solid transparent; }
        .version-card:hover { background-color: #3a3a3c; border-color: var(--accent-color); transform: scale(1.02); }
        .version-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 8px; margin-bottom: 10px; }
        .version-card span { font-size: 13px; font-weight: 600; display: block; color: #fff; }

        /* PLAYER TELA CHEIA MOBILE */
        .expanded-player-mobile {
            position: fixed; top: 100%; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(40px) brightness(0.6); -webkit-backdrop-filter: blur(40px) brightness(0.6);
            z-index: 999999; display: flex; flex-direction: column;
            padding: 40px 30px; transition: top 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            color: white;
        }
        .expanded-player-mobile.active { top: 0; }

                    { num: "4", title: "Break the Ice", file: "04 - Break the Ice (Main Version).mp3" },

        let selectedAlbum = null; let selectedVersion = null;
        let currentTrackIndex = 0; let playingAlbum = null; let playingTracks = []; 
        let currentRepeatMode = 0; let isShuffleActive = false;
        
        let currentCarouselIndex = 0;
        let carouselCards = [];

        const audio = document.getElementById('audioElement');
        const playIcon = document.getElementById('playIcon');
        const expPlayIcon = document.getElementById('expPlayIcon');
        const progressBarFill = document.getElementById('progressBarFill');
        const progressBarBg = document.getElementById('progressBarBg');
        const expProgressBarFill = document.getElementById('expProgressBarFill');
        const expProgressBarBg = document.getElementById('expProgressBarBg');

        function initApp() {
            renderDashboard();
            audio.volume = 0.8;
            
            if (localStorage.getItem('theme') === 'light') {
                document.body.classList.add('light-mode');
                document.getElementById('themeToggle').checked = true;
            }
            
            const savedLayout = localStorage.getItem('layoutStyle') || 'carousel';
            document.getElementById('layoutSelector').value = savedLayout;
            changeLayout();

            const savedBgStyle = localStorage.getItem('bgStyle') || 'default';
            document.getElementById('bgStyleSelector').value = savedBgStyle;
            applyBackgroundStyle(savedBgStyle);

            if ('mediaSession' in navigator) {
                navigator.mediaSession.setActionHandler('play', () => { audio.play(); updatePlayButton(true); });
                navigator.mediaSession.setActionHandler('pause', () => { audio.pause(); updatePlayButton(false); });
                navigator.mediaSession.setActionHandler('previoustrack', prevTrack);
                navigator.mediaSession.setActionHandler('nexttrack', nextTrack);
            }
            
            initSwipeToClose();
            initKeyboardControls();
            window.addEventListener('resize', updateCarousel);
            
            document.addEventListener('click', function(event) {
                const popup = document.getElementById('settingsPopup');
                if (popup && popup.classList.contains('show') && !event.target.closest('.top-right-settings')) {
                    popup.classList.remove('show');
                }
            });
        }

        function changeLayout() {
            const layout = document.getElementById('layoutSelector').value;
            localStorage.setItem('layoutStyle', layout);
            if (layout === 'grid') {
                document.body.classList.add('layout-grid');
            } else {
                document.body.classList.remove('layout-grid');
            }
        }

        function renderDashboard() {
            const track = document.getElementById('albumCarousel');
            const grid = document.getElementById('albumGrid');
            track.innerHTML = ''; grid.innerHTML = '';
            
            albums.forEach((album, index) => {
                const cCard = document.createElement('div');
                cCard.className = 'carousel-card';
                cCard.onclick = () => { if (currentCarouselIndex === index) handleAlbumClick(album); else { currentCarouselIndex = index; updateCarousel(); } };
                cCard.innerHTML = `<div class="album-art-wrapper"><img src="${album.folder}/${album.cover}" alt="${album.title}"></div><div class="album-card-title">${album.title}</div><div class="album-card-artist">${album.artist}</div>`;
                track.appendChild(cCard);

                const gCard = document.createElement('div');
                gCard.className = 'grid-card'; gCard.onclick = () => handleAlbumClick(album);
                gCard.innerHTML = `<div class="album-art-wrapper"><img src="${album.folder}/${album.cover}" alt="${album.title}"></div><div class="album-card-title">${album.title}</div><div class="album-card-artist">${album.artist}</div>`;
                grid.appendChild(gCard);
            });
            carouselCards = document.querySelectorAll('#albumCarousel .carousel-card');
            updateCarousel();
        }

        function updateCarousel() {
            const space = 238; 
            carouselCards.forEach((card, i) => {
                const offset = i - currentCarouselIndex; const sign = Math.sign(offset); const absOffset = Math.abs(offset);
                if (absOffset === 0) {
                    card.style.transform = `translate(-50%, -50%) scale(1.15) translateZ(100px) rotateY(0deg)`; card.style.zIndex = 10; card.style.opacity = 1; card.style.pointerEvents = 'auto';
                } else {
                    const tx = sign * space * (absOffset === 1 ? 1 : 1.7); const rot = sign * -35 * (absOffset === 1 ? 1 : 1.3); const tz = -100 * absOffset;
                    card.style.transform = `translate(-50%, -50%) scale(0.85) translateX(${tx}px) rotateY(${rot}deg) translateZ(${tz}px)`; card.style.zIndex = 10 - absOffset; card.style.opacity = absOffset > 2 ? 0 : 0.85 - (absOffset * 0.25); card.style.pointerEvents = absOffset === 1 ? 'auto' : 'none';
                }
            });
        }

        function nextCarousel() { if (currentCarouselIndex < carouselCards.length - 1) { currentCarouselIndex++; updateCarousel(); } }
        function prevCarousel() { if (currentCarouselIndex > 0) { currentCarouselIndex--; updateCarousel(); } }

        function initKeyboardControls() {
            document.addEventListener('keydown', (e) => {
                if (document.getElementById('dashboardSection').style.display !== 'none' && window.innerWidth > 820) {
                    if (!document.body.classList.contains('layout-grid')) {
                        if (e.key === 'ArrowRight') nextCarousel(); else if (e.key === 'ArrowLeft') prevCarousel(); else if (e.key === 'Enter') { const activeAlbum = albums[currentCarouselIndex]; if (activeAlbum) handleAlbumClick(activeAlbum); }
                    }
                }
            });
        }

        function handleAlbumClick(album) { album.hasVersions ? openVersionModal(album) : openAlbum(album, null); }

        function openVersionModal(album) {
            document.getElementById('versionModalTitle').innerText = album.title;
            const grid = document.getElementById('versionGrid'); grid.innerHTML = '';
            album.versions.forEach(ver => {
                const item = document.createElement('div'); item.className = 'version-card';
                item.onclick = () => { closeVersionModal(); openAlbum(album, ver); };
                item.innerHTML = `<img src="${album.folder}/${ver.cover}" alt="${ver.versionName}"><span>${ver.versionName}</span>`; grid.appendChild(item);
            });
            document.getElementById('versionModal').style.display = 'flex';
        }

        function closeVersionModal() { document.getElementById('versionModal').style.display = 'none'; }

        function openAlbum(album, version) {
            selectedAlbum = album; selectedVersion = version;
            document.getElementById('dashboardSection').style.display = 'none'; document.getElementById('albumDetailSection').style.display = 'flex';
            document.getElementById('albumTitle').innerText = version ? version.versionName : album.title;
            document.getElementById('albumArtist').innerText = album.artist;
            document.querySelector('.album-meta').innerText = `${version ? version.genre : album.genre} • ${version ? version.year : album.year}`;

            const videoFile = (version && version.video) ? version.video : (album.video || null);
            const artEl = document.getElementById('albumArt'); const videoEl = document.getElementById('albumVideo');

            if (videoFile && videoFile !== "") {
                artEl.style.display = 'none'; videoEl.style.display = 'block'; videoEl.src = `${album.folder}/${videoFile}`; videoEl.play().catch(()=>{});
            } else {
                videoEl.style.display = 'none'; videoEl.pause(); videoEl.src = "";
                artEl.src = `${album.folder}/${version ? version.cover : album.cover}`; artEl.style.display = 'block';
            }
            updateDynamicBackground(); renderTracklist();
        }

        function renderTracklist() {
            const tracklistEl = document.getElementById('tracklist'); tracklistEl.innerHTML = '';
            const tracks = (selectedVersion && selectedVersion.tracks) ? selectedVersion.tracks : selectedAlbum.tracks;

            tracks.forEach((track, index) => {
                const row = document.createElement('div'); row.className = 'track-row'; row.id = `track-${index}`;
                row.onclick = () => { playingAlbum = selectedAlbum; playingTracks = tracks; playTrack(index); };
                row.innerHTML = `<div class="equalizer"><div class="eq-bar eq-bar-1"></div><div class="eq-bar eq-bar-2"></div><div class="eq-bar eq-bar-3"></div></div><div class="track-number">${track.num}</div><div class="track-title">${track.title}</div>`;
                tracklistEl.appendChild(row);
            });
            updateTracklistVisuals();
        }

        function showDashboard() {
            document.getElementById('albumVideo').pause(); document.getElementById('dashboardSection').style.display = 'block';
            document.getElementById('albumDetailSection').style.display = 'none'; selectedAlbum = null; 
			document.body.classList.remove('player-active');
            updateDynamicBackground(); updateCarousel(); 
        }

        function playTrack(index) {
            currentTrackIndex = index; 
            if(playingTracks.length === 0 && playingAlbum) playingTracks = playingAlbum.tracks;
            const track = playingTracks[index]; 
            if(!track) return;
            
            const player = document.getElementById('mainFloatingPlayer');
            player.style.display = 'flex';
            player.classList.remove('player-collapsed'); 
            updateCollapseButtonIcon();
			document.body.classList.add('player-active');

            const coverPath = `${playingAlbum.folder}/${playingAlbum.cover}`;
            document.getElementById('miniPlayerArt').src = coverPath; document.getElementById('miniPlayerTitle').innerText = track.title; document.getElementById('miniPlayerArtist').innerText = playingAlbum.artist;
            document.getElementById('expArt').src = coverPath; document.getElementById('expTitle').innerText = track.title; document.getElementById('expArtist').innerText = playingAlbum.artist;

            if ('mediaSession' in navigator) {
                const absoluteCoverUrl = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1) + coverPath;
                navigator.mediaSession.metadata = new MediaMetadata({ title: track.title, artist: playingAlbum.artist, album: playingAlbum.title, artwork: [{ src: absoluteCoverUrl, sizes: '512x512', type: 'image/jpeg' }] });
            }
            audio.src = `${playingAlbum.folder}/${track.file}`; audio.play().catch(()=>{}); updatePlayButton(true); updateTracklistVisuals();
        }

        function playAlbumFromStart() { if (selectedAlbum) { playingAlbum = selectedAlbum; playingTracks = (selectedVersion && selectedVersion.tracks) ? selectedVersion.tracks : selectedAlbum.tracks; playTrack(0); } }

        function togglePlay() {
            if (!audio.src) { if(albums.length > 0) handleAlbumClick(albums[0]); return; }
            if (audio.paused) { audio.play(); updatePlayButton(true); } else { audio.pause(); updatePlayButton(false); }
            updateTracklistVisuals();
        }

        function updatePlayButton(isPlaying) {
            const playSvg = `<path d="M8 5v14l11-7z"/>`; const pauseSvg = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`;
            playIcon.innerHTML = isPlaying ? pauseSvg : playSvg; expPlayIcon.innerHTML = isPlaying ? pauseSvg : playSvg;
        }

        function updateTracklistVisuals() {
            document.querySelectorAll('.track-row').forEach(row => row.classList.remove('playing'));
            if (playingAlbum && selectedAlbum && playingAlbum.id === selectedAlbum.id && !audio.paused) { const activeRow = document.getElementById(`track-${currentTrackIndex}`); if (activeRow) activeRow.classList.add('playing'); }
        }

        /* LÓGICA DE REPETIÇÃO CORRIGIDA COMPLETA */
        function nextTrack() {
            if (playingTracks.length === 0) return;
            
            // Modo 1: Repetir 1 Música
            if (currentRepeatMode === 1) { 
                playTrack(currentTrackIndex); 
                return; 
            }
            
            // Modo Aleatório Ativo
            if (isShuffleActive) { 
                playTrack(Math.floor(Math.random() * playingTracks.length)); 
                return; 
            }
            
            // Avança normalmente se não for a última faixa
            if (currentTrackIndex < playingTracks.length - 1) {
                playTrack(currentTrackIndex + 1);
            } else {
                // Chegou ao fim das faixas atuais do álbum
                if (currentRepeatMode === 2) { 
                    // Modo 2: Repetir Álbum (Volta para a faixa 0)
                    playTrack(0); 
                } else if (currentRepeatMode === 3) { 
                    // Modo 3: Discografia Completa (Vai para o próximo álbum da lista global)
                    let currentAlbumIdx = albums.findIndex(a => a.id === playingAlbum.id);
                    let nextAlbumIdx = (currentAlbumIdx + 1) % albums.length;
                    
                    playingAlbum = albums[nextAlbumIdx];
                    let targetVersion = null;

                    // CORREÇÃO: Verifica se o álbum tem versões e escolhe a que tiver mais tracks
                    if (playingAlbum.hasVersions && playingAlbum.versions && playingAlbum.versions.length > 0) {
                        targetVersion = playingAlbum.versions.reduce((max, current) => {
                            return (current.tracks.length > max.tracks.length) ? current : max;
                        }, playingAlbum.versions[0]);
                        playingTracks = targetVersion.tracks;
                    } else {
                        playingTracks = playingAlbum.tracks;
                    }
                    
                    // Atualiza a tela se o usuário estiver olhando para ela
                    if (document.getElementById('albumDetailSection').style.display === 'flex' && selectedAlbum) {
                        openAlbum(playingAlbum, targetVersion);
                    }
                    playTrack(0);
                } else {
                    // Repetição Desligada (Para a reprodução)
                    audio.pause();
                    updatePlayButton(false);
                }
            }
        }
        
        function prevTrack() { if (playingTracks.length === 0) return; currentTrackIndex = currentTrackIndex - 1 < 0 ? playingTracks.length - 1 : currentTrackIndex - 1; playTrack(currentTrackIndex); }

        audio.addEventListener('timeupdate', () => {
            if (!audio.duration) return;
            const percent = (audio.currentTime / audio.duration) * 100;
            const formatTime = (seconds) => `${Math.floor(seconds / 60)}:${Math.floor(seconds % 60).toString().padStart(2, '0')}`;
            progressBarFill.style.width = `${percent}%`; progressBarBg.style.setProperty('--progress-percent', `${percent}%`);
            document.getElementById('timeCurrent').innerText = formatTime(audio.currentTime); document.getElementById('timeRemaining').innerText = "-" + formatTime(audio.duration - audio.currentTime);
            expProgressBarFill.style.width = `${percent}%`; expProgressBarBg.style.setProperty('--exp-progress', `${percent}%`);
            document.getElementById('expTimeCurrent').innerText = formatTime(audio.currentTime); document.getElementById('expTimeRemaining').innerText = "-" + formatTime(audio.duration - audio.currentTime);
        });

        function seekAudio(event) { if (!audio.duration) return; audio.currentTime = ((event.clientX - progressBarBg.getBoundingClientRect().left) / progressBarBg.getBoundingClientRect().width) * audio.duration; }
        function seekAudioExp(event) { if (!audio.duration) return; audio.currentTime = ((event.clientX - expProgressBarBg.getBoundingClientRect().left) / expProgressBarBg.getBoundingClientRect().width) * audio.duration; }
        function setVolume(value) { audio.volume = value; }
        audio.addEventListener('ended', nextTrack);

        const expPlayer = document.getElementById('expandedPlayerMobile');
        function openExpandedPlayer() { if (window.innerWidth <= 820) { expPlayer.classList.add('active'); document.body.style.overflow = 'hidden'; } }
        function closeExpandedPlayer() { expPlayer.classList.remove('active'); document.body.style.overflow = ''; }

        function initSwipeToClose() {
            let touchStartY = 0;
            expPlayer.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, {passive: true});
            expPlayer.addEventListener('touchmove', e => { const currentY = e.touches[0].clientY; if (currentY > touchStartY && (currentY - touchStartY) > 50) { if(e.target.tagName !== "INPUT") closeExpandedPlayer(); } }, {passive: true});
        }
        
        function toggleShuffle() { isShuffleActive = !isShuffleActive; document.getElementById('shuffleBtn').classList.toggle('active'); }
        
        function toggleRepeatMode() {
            currentRepeatMode = (currentRepeatMode + 1) % 4; const btn = document.getElementById('repeatText');
            if (currentRepeatMode === 0) btn.innerText = "Off"; 
            else if (currentRepeatMode === 1) btn.innerText = "Música"; 
            else if (currentRepeatMode === 2) btn.innerText = "Álbum"; 
            else btn.innerText = "Disco";
        }
        
        function toggleTheme() { document.body.classList.toggle('light-mode'); localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark'); }
        function changeBackgroundStyle() { localStorage.setItem('bgStyle', document.getElementById('bgStyleSelector').value); applyBackgroundStyle(document.getElementById('bgStyleSelector').value); }
        
        function applyBackgroundStyle(style) {
            if (style === 'art') { document.body.classList.add('bg-art-active'); document.documentElement.style.setProperty('--blur-overlay-opacity', '1'); } else { document.body.classList.remove('bg-art-active'); document.documentElement.style.setProperty('--blur-overlay-opacity', '0'); }
            updateDynamicBackground();
        }
        function updateDynamicBackground() {
            const blurBg = document.getElementById('dynamicBlurBg');
            if (document.body.classList.contains('bg-art-active') && document.getElementById('albumDetailSection').style.display === 'flex' && selectedAlbum) { blurBg.style.backgroundImage = `url('${selectedAlbum.folder}/fundo.png')`; } else { blurBg.style.backgroundImage = 'none'; }
        }
        
        function toggleSettings(event) {
            event.stopPropagation();
            document.getElementById('settingsPopup').classList.toggle('show');
        }

        function handlePlayerWrapperClick(event) {
            const player = document.getElementById('mainFloatingPlayer');
            
            if (player.classList.contains('player-collapsed')) {
                player.classList.remove('player-collapsed');
                updateCollapseButtonIcon();
                event.stopPropagation();
                return;
            }
            
            if (event.target.closest('#playerCollapseBtn')) {
                event.stopPropagation();
                togglePlayerCollapse();
                return;
            }
            
            openExpandedPlayer();
        }

        function togglePlayerCollapse() {
            const player = document.getElementById('mainFloatingPlayer');
            player.classList.toggle('player-collapsed');
            updateCollapseButtonIcon();
            document.body.classList.add('player-active');
        }

        function updateCollapseButtonIcon() {
            const player = document.getElementById('mainFloatingPlayer');
            const icon = document.getElementById('playerCollapseIcon');
            if (player.classList.contains('player-collapsed')) {
                icon.innerHTML = `<path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/>`;
            } else {
                icon.innerHTML = `<path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/>`;
            }
        }

        initApp();
    </script>
